datacenter: "RS00"
cluster: "vcs-rs-00"
# Host is overridden by FVMW_HOST env var to match the route hostname.
# libvirt's ESX driver (vpx://) connects to this host for disk transfer.
host: "fvmw-esxi-01.example.com"
datastore: "workload_share"
network: "segment-migrating-to-ocpvirt"
folder: "Roadshow"
vms:
  - name: "database"
    guestId: "centos8_64Guest"
    disk: "database.vmdk"
    diskSizeGB: 5
    memoryMB: 2048
    numCPUs: 1
    firmware: "efi"
    diskController: "pvscsi"
  - name: "winweb01"
    guestId: "windows2019srvNext_64Guest"
    disk: "winweb01.vmdk"
    diskSizeGB: 21
    memoryMB: 6144
    numCPUs: 2
    firmware: "efi"
    diskController: "lsilogic-sas"
  - name: "winweb02"
    guestId: "windows2019srvNext_64Guest"
    disk: "winweb02.vmdk"
    diskSizeGB: 21
    memoryMB: 6144
    numCPUs: 2
    firmware: "efi"
    diskController: "lsilogic-sas"
  - name: "haproxy"
    guestId: "other26xLinux64Guest"
    disk: "haproxy.vmdk"
    diskSizeGB: 4
    memoryMB: 4096
    numCPUs: 2
    firmware: "efi"
