# Reference manifest - see deploy/ansible/ for automated deployment.
# To use manually: replace ${USER}, ${CLUSTER_DOMAIN} with actual values.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vcenter-${USER}
  labels:
    app: fvmw
    user: ${USER}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fvmw
      user: ${USER}
  template:
    metadata:
      labels:
        app: fvmw
        user: ${USER}
    spec:
      containers:
        - name: fvmw
          image: quay.io/rhpds/fvmw:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            - name: FVMW_LISTEN_ADDR
              value: ":8080"
            - name: FVMW_DISK_PATH
              value: "/disks"
            - name: FVMW_EXTERNAL_HOST
              value: "vcenter-${USER}.${CLUSTER_DOMAIN}"
            - name: FVMW_USERNAME
              valueFrom:
                secretKeyRef:
                  name: fvmw-credentials
                  key: username
            - name: FVMW_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fvmw-credentials
                  key: password
          volumeMounts:
            - name: disks
              mountPath: /disks
              readOnly: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /about
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /about
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: disks
          persistentVolumeClaim:
            claimName: fvmw-disks
            readOnly: true
