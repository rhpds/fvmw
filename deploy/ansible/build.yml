---
# build.yml - Set up OCP BuildConfig with GitHub webhook for fvmw
#
# This creates:
#   - ImageStream for fvmw
#   - Source secret for private GitHub repo (if github_token is set)
#   - BuildConfig with GitHub webhook trigger
#   - Triggers initial build
#
# Usage:
#   ansible-playbook build.yml -e @../../local.env

- name: Set up fvmw build pipeline on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    fvmw_namespace: fvmw
    fvmw_image_stream: fvmw
    github_repo_url: https://github.com/rhpds/fvmw.git
    github_repo: rhpds/fvmw
    github_ref: main
    github_token: ""
    webhook_secret: "{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=32') }}"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - fvmw_namespace | length > 0

    - name: Ensure namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ fvmw_namespace }}"
        state: present

    - name: Create source secret for private GitHub repo
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: github-source-secret
            namespace: "{{ fvmw_namespace }}"
            annotations:
              build.openshift.io/source-secret-match-uri-1: "https://github.com/rhpds/*"
          type: kubernetes.io/basic-auth
          stringData:
            password: "{{ github_token }}"
      when: github_token | length > 0

    - name: Create ImageStream
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: "{{ fvmw_image_stream }}"
            namespace: "{{ fvmw_namespace }}"
            labels:
              app: fvmw

    - name: Create BuildConfig with GitHub webhook
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: fvmw
            namespace: "{{ fvmw_namespace }}"
            labels:
              app: fvmw
          spec:
            source:
              type: Git
              git:
                uri: "{{ github_repo_url }}"
                ref: "{{ github_ref }}"
              sourceSecret: "{{ {'name': 'github-source-secret'} if github_token | length > 0 else omit }}"
            strategy:
              type: Docker
              dockerStrategy:
                dockerfilePath: build/Containerfile
            output:
              to:
                kind: ImageStreamTag
                name: "{{ fvmw_image_stream }}:latest"
            triggers:
              - type: GitHub
                github:
                  secret: "{{ webhook_secret }}"
              - type: ConfigChange

    - name: Get BuildConfig webhook secret
      kubernetes.core.k8s_info:
        api_version: build.openshift.io/v1
        kind: BuildConfig
        name: fvmw
        namespace: "{{ fvmw_namespace }}"
      register: bc_info

    - name: Extract webhook secret from BuildConfig
      ansible.builtin.set_fact:
        actual_webhook_secret: >-
          {{ (bc_info.resources[0].spec.triggers
              | selectattr('type', 'equalto', 'GitHub')
              | first).github.secret }}

    - name: Get cluster API URL from kubeconfig
      kubernetes.core.k8s_cluster_info:
      register: cluster_info

    - name: Build webhook URL
      ansible.builtin.set_fact:
        webhook_url: "{{ cluster_info.connection.host }}/apis/build.openshift.io/v1/namespaces/{{ fvmw_namespace }}/buildconfigs/fvmw/webhooks/{{ actual_webhook_secret }}/github"

    - name: Display webhook configuration
      ansible.builtin.debug:
        msg: |
          BuildConfig created successfully.

          GitHub Webhook URL:
            {{ webhook_url }}

          To configure in GitHub:
            1. Go to https://github.com/{{ github_repo }}/settings/hooks
            2. Click "Add webhook"
            3. Paste the URL above
            4. Content type: application/json
            5. Secret: (leave blank - secret is in the URL)
            6. SSL verification: disable (for self-signed API certs)
            7. Events: Just the push event

          To trigger a build manually:
            oc start-build fvmw -n {{ fvmw_namespace }} --follow

    - name: Wait for initial build to start (via ConfigChange trigger)
      kubernetes.core.k8s_info:
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ fvmw_namespace }}"
        label_selectors:
          - "buildconfig=fvmw"
      register: builds
      until: builds.resources | length > 0
      retries: 6
      delay: 5

    - name: Show build status
      ansible.builtin.debug:
        msg: >-
          Build {{ builds.resources[0].metadata.name }} is {{ builds.resources[0].status.phase }}.
          Monitor with: oc logs -f buildconfig/fvmw -n {{ fvmw_namespace }}
