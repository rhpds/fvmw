---
# build.yml - Set up OCP BuildConfig with GitHub webhook for fvmw
#
# This creates:
#   - ImageStream for fvmw
#   - BuildConfig with GitHub webhook trigger
#   - Prints the webhook URL to configure in GitHub
#
# Usage:
#   ansible-playbook build.yml -e @../../local.env

- name: Set up fvmw build pipeline on OpenShift
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    namespace: fvmw
    fvmw_image_stream: fvmw
    github_repo: https://github.com/rhpds/fvmw.git
    github_ref: main
    webhook_secret: "{{ lookup('password', '/dev/null chars=ascii_lowercase,digits length=32') }}"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - namespace | length > 0

    - name: Ensure namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ namespace }}"
        state: present

    - name: Create ImageStream
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: "{{ fvmw_image_stream }}"
            namespace: "{{ namespace }}"
            labels:
              app: fvmw

    - name: Create BuildConfig with GitHub webhook
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: fvmw
            namespace: "{{ namespace }}"
            labels:
              app: fvmw
          spec:
            source:
              type: Git
              git:
                uri: "{{ github_repo }}"
                ref: "{{ github_ref }}"
            strategy:
              type: Docker
              dockerStrategy:
                dockerfilePath: build/Containerfile
            output:
              to:
                kind: ImageStreamTag
                name: "{{ fvmw_image_stream }}:latest"
            triggers:
              - type: GitHub
                github:
                  secret: "{{ webhook_secret }}"
              - type: ConfigChange

    - name: Get webhook URL
      kubernetes.core.k8s_info:
        api_version: build.openshift.io/v1
        kind: BuildConfig
        name: fvmw
        namespace: "{{ namespace }}"
      register: bc_info

    - name: Get cluster API server URL
      ansible.builtin.command: oc whoami --show-server
      register: api_server
      changed_when: false

    - name: Display webhook configuration
      ansible.builtin.debug:
        msg: |
          BuildConfig created successfully.

          GitHub Webhook URL:
            {{ api_server.stdout }}/apis/build.openshift.io/v1/namespaces/{{ namespace }}/buildconfigs/fvmw/webhooks/{{ webhook_secret }}/github

          To configure in GitHub:
            1. Go to https://github.com/rhpds/fvmw/settings/hooks
            2. Click "Add webhook"
            3. Paste the URL above
            4. Content type: application/json
            5. Secret: (leave blank - secret is in the URL)
            6. Events: Just the push event

          To trigger a build manually:
            oc start-build fvmw -n {{ namespace }} --follow

    - name: Start initial build
      ansible.builtin.command: "oc start-build fvmw -n {{ namespace }}"
      register: build_result
      changed_when: "'started' in build_result.stdout"

    - name: Show build status
      ansible.builtin.debug:
        msg: "{{ build_result.stdout }}"
