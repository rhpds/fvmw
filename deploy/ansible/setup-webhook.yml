---
# setup-webhook.yml - Register GitHub webhook pointing to OCP BuildConfig
#
# This reads the webhook URL from an existing BuildConfig and
# registers it as a GitHub webhook on the rhpds/fvmw repo.
#
# Prerequisites:
#   - BuildConfig already created (run build.yml first)
#   - github_token set in local.env (needs admin:repo_hook scope)
#
# Usage:
#   ansible-playbook setup-webhook.yml -e @../../local.env

- name: Set up GitHub webhook for fvmw BuildConfig
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    namespace: fvmw
    github_repo: rhpds/fvmw
    github_token: ""

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - github_token | length > 0
        fail_msg: "github_token must be set in local.env"

    - name: Get BuildConfig details
      kubernetes.core.k8s_info:
        api_version: build.openshift.io/v1
        kind: BuildConfig
        name: fvmw
        namespace: "{{ namespace }}"
      register: bc_info

    - name: Fail if BuildConfig not found
      ansible.builtin.assert:
        that:
          - bc_info.resources | length > 0
        fail_msg: "BuildConfig 'fvmw' not found in namespace '{{ namespace }}'. Run build.yml first."

    - name: Extract webhook secret
      ansible.builtin.set_fact:
        webhook_secret: >-
          {{ (bc_info.resources[0].spec.triggers
              | selectattr('type', 'equalto', 'GitHub')
              | first).github.secret }}

    - name: Get cluster API URL
      kubernetes.core.k8s_cluster_info:
      register: cluster_info

    - name: Build webhook URL
      ansible.builtin.set_fact:
        webhook_url: "{{ cluster_info.connection.host }}/apis/build.openshift.io/v1/namespaces/{{ namespace }}/buildconfigs/fvmw/webhooks/{{ webhook_secret }}/github"

    - name: Check existing GitHub webhooks
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_repo }}/hooks"
        method: GET
        headers:
          Authorization: "Bearer {{ github_token }}"
          Accept: application/vnd.github+json
        status_code: 200
      register: existing_hooks

    - name: Check if webhook already exists
      ansible.builtin.set_fact:
        webhook_exists: "{{ existing_hooks.json | selectattr('config.url', 'equalto', webhook_url) | list | length > 0 }}"

    - name: Create GitHub webhook
      ansible.builtin.uri:
        url: "https://api.github.com/repos/{{ github_repo }}/hooks"
        method: POST
        headers:
          Authorization: "Bearer {{ github_token }}"
          Accept: application/vnd.github+json
        body_format: json
        body:
          name: web
          config:
            url: "{{ webhook_url }}"
            content_type: json
            insecure_ssl: "1"
          events:
            - push
          active: true
        status_code: 201
      when: not webhook_exists

    - name: Display result
      ansible.builtin.debug:
        msg: |
          {% if not webhook_exists %}
          GitHub webhook created successfully.
          {% else %}
          GitHub webhook already exists.
          {% endif %}

          Webhook URL: {{ webhook_url }}

          On every push to {{ github_repo }}, OCP will automatically
          build a new container image and push to the internal ImageStream.

          To use the built image in deployments, set in local.env:
            fvmw_image: image-registry.openshift-image-registry.svc:5000/{{ namespace }}/fvmw:latest
