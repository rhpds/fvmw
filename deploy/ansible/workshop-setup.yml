---
# workshop-setup.yml - Full workshop environment setup
#
# Sets up everything needed to run the MTV migration demo with fvmw:
#   1. Builds the fvmw container image from GitHub
#   2. Creates shared PVC and downloads flat VMDK disk images
#   3. Deploys vcenter + esxi pods per user
#   4. Creates MTV provider, mappings, and target namespace per user
#
# Prerequisites:
#   - Workshop cluster with MTV and CNV installed
#   - Kubeconfig with cluster-admin access
#   - Disk server running on infra cluster (or real vCenter for export)
#
# Usage:
#   ansible-playbook workshop-setup.yml -e @../../workshop-deploy.env

- name: Set up fvmw workshop environment
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    fvmw_namespace: fvmw
    fvmw_image: image-registry.openshift-image-registry.svc:5000/fvmw/fvmw:latest
    fvmw_password: changeme  # pragma: allowlist secret
    fvmw_username: administrator@vsphere.local
    fvmw_users: []
    cluster_domain: ""
    storage_class: ""
    fvmw_disk_pvc: fvmw-disks
    k8s_kubeconfig: ""
    github_token: ""

    # Disk source: URL of the disk server hosting flat VMDKs
    # If not set, falls back to exporting from source_vcenter
    # URL of the disk server hosting flat VMDKs (set in workshop-deploy.env)
    disk_source_url: ""

    # Fallback: export from real vCenter (slower)
    source_vcenter_url: ""
    source_vcenter_user: ""
    source_vcenter_password: ""  # pragma: allowlist secret
    source_vms:
      - name: database
        path: "/RS00/vm/Roadshow/database"
      - name: winweb01
        path: "/RS00/vm/Roadshow/winweb01"
      - name: winweb02
        path: "/RS00/vm/Roadshow/winweb02"
      - name: haproxy
        path: "/RS00/vm/Roadshow/haproxy-user1"

  environment:
    K8S_AUTH_KUBECONFIG: "{{ k8s_kubeconfig | default(omit, true) }}"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - cluster_domain | length > 0
          - fvmw_users | length > 0
          - k8s_kubeconfig | length > 0
        fail_msg: "cluster_domain, fvmw_users, and k8s_kubeconfig must be set."

    # --- Step 1: Create namespace ---
    - name: Ensure namespace exists
      kubernetes.core.k8s:
        api_version: v1
        kind: Namespace
        name: "{{ fvmw_namespace }}"
        state: present

    # --- Step 2: Build fvmw image ---
    - name: Create source secret for private repo
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: github-source-secret
            namespace: "{{ fvmw_namespace }}"
            annotations:
              build.openshift.io/source-secret-match-uri-1: "https://github.com/rhpds/*"
          type: kubernetes.io/basic-auth
          stringData:
            password: "{{ github_token }}"
      when: github_token | length > 0

    - name: Create ImageStream
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: image.openshift.io/v1
          kind: ImageStream
          metadata:
            name: fvmw
            namespace: "{{ fvmw_namespace }}"

    - name: Create BuildConfig
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: build.openshift.io/v1
          kind: BuildConfig
          metadata:
            name: fvmw
            namespace: "{{ fvmw_namespace }}"
          spec:
            source:
              type: Git
              git:
                uri: https://github.com/rhpds/fvmw.git
                ref: main
              sourceSecret: "{{ {'name': 'github-source-secret'} if github_token | length > 0 else omit }}"
            strategy:
              type: Docker
              dockerStrategy:
                dockerfilePath: build/Containerfile
            output:
              to:
                kind: ImageStreamTag
                name: fvmw:latest
            triggers:
              - type: ConfigChange

    - name: Wait for build to complete
      kubernetes.core.k8s_info:
        api_version: build.openshift.io/v1
        kind: Build
        namespace: "{{ fvmw_namespace }}"
        label_selectors:
          - "buildconfig=fvmw"
      register: builds
      until: builds.resources | selectattr('status.phase', 'equalto', 'Complete') | list | length > 0
      retries: 30
      delay: 10

    # --- Step 3: Deploy fvmw infrastructure (PVC, credentials, pods) ---
    - name: Create shared disk PVC
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: "{{ fvmw_disk_pvc }}"
            namespace: "{{ fvmw_namespace }}"
          spec:
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: 100Gi
            storageClassName: "{{ storage_class if storage_class else omit }}"

    - name: Create credentials secret
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Secret
          metadata:
            name: fvmw-credentials
            namespace: "{{ fvmw_namespace }}"
          type: Opaque
          stringData:
            username: "{{ fvmw_username }}"
            password: "{{ fvmw_password }}"

    # --- Step 4: Download/prepare disk images ---
    - name: Prepare disk images
      ansible.builtin.include_tasks: tasks/prepare-disks.yml

    # --- Step 5: Deploy per-user fvmw instances ---
    - name: Deploy per-user fvmw instances
      loop: "{{ fvmw_users }}"
      loop_control:
        loop_var: fvmw_user
      ansible.builtin.include_tasks: tasks/deploy-user.yml

    # --- Step 6: Create MTV resources per user ---
    - name: Create MTV namespaces and providers
      loop: "{{ fvmw_users }}"
      loop_control:
        loop_var: fvmw_user
      block:
        - name: "Create mtv-{{ fvmw_user }} namespace"
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "mtv-{{ fvmw_user }}"
            state: present

        - name: "Create vmexamples-{{ fvmw_user }} namespace"
          kubernetes.core.k8s:
            api_version: v1
            kind: Namespace
            name: "vmexamples-{{ fvmw_user }}"
            state: present

        - name: "Create provider credentials for {{ fvmw_user }}"
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: v1
              kind: Secret
              metadata:
                name: fvmw-credentials
                namespace: "mtv-{{ fvmw_user }}"
              type: Opaque
              stringData:
                user: "{{ fvmw_username }}"
                password: "{{ fvmw_password }}"
                insecureSkipVerify: "true"

        - name: "Create VMware provider for {{ fvmw_user }}"
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: forklift.konveyor.io/v1beta1
              kind: Provider
              metadata:
                name: vmware
                namespace: "mtv-{{ fvmw_user }}"
              spec:
                type: vsphere
                url: "https://vcenter-{{ fvmw_user }}.{{ cluster_domain }}/sdk"
                secret:
                  name: fvmw-credentials
                  namespace: "mtv-{{ fvmw_user }}"
                settings:
                  sdkEndpoint: vcenter

        - name: "Create host provider for {{ fvmw_user }}"
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: forklift.konveyor.io/v1beta1
              kind: Provider
              metadata:
                name: host
                namespace: "mtv-{{ fvmw_user }}"
              spec:
                type: openshift

        - name: "Create network map for {{ fvmw_user }}"
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: forklift.konveyor.io/v1beta1
              kind: NetworkMap
              metadata:
                name: network-map
                namespace: "mtv-{{ fvmw_user }}"
              spec:
                map:
                  - source:
                      type: pod
                    destination:
                      type: pod
                provider:
                  source:
                    name: vmware
                    namespace: "mtv-{{ fvmw_user }}"
                  destination:
                    name: host
                    namespace: "mtv-{{ fvmw_user }}"

        - name: "Create storage map for {{ fvmw_user }}"
          kubernetes.core.k8s:
            state: present
            definition:
              apiVersion: forklift.konveyor.io/v1beta1
              kind: StorageMap
              metadata:
                name: storage-map
                namespace: "mtv-{{ fvmw_user }}"
              spec:
                map:
                  - source:
                      id: datastore-19
                    destination:
                      storageClass: ocs-external-storagecluster-ceph-rbd
                      accessMode: ReadWriteOnce
                provider:
                  source:
                    name: vmware
                    namespace: "mtv-{{ fvmw_user }}"
                  destination:
                    name: host
                    namespace: "mtv-{{ fvmw_user }}"

    - name: Workshop setup complete
      ansible.builtin.debug:
        msg: |
          Workshop environment ready!

          Per-user endpoints:
          {% for user in fvmw_users %}
            {{ user }}:
              vCenter: https://vcenter-{{ user }}.{{ cluster_domain }}/sdk
              MTV namespace: mtv-{{ user }}
              Target namespace: vmexamples-{{ user }}
          {% endfor %}

          Credentials: {{ fvmw_username }} / {{ fvmw_password }}

          Students can now follow the roadshow migration instructions.
