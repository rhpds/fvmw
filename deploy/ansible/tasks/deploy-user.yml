---
# Deploy a single fvmw instance for a user

- name: "Deploy fvmw for {{ fvmw_user }}"
  block:
    - name: "Create Deployment for {{ fvmw_user }}"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: "vcenter-{{ fvmw_user }}"
            namespace: "{{ namespace }}"
            labels:
              app: fvmw
              user: "{{ fvmw_user }}"
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: fvmw
                user: "{{ fvmw_user }}"
            template:
              metadata:
                labels:
                  app: fvmw
                  user: "{{ fvmw_user }}"
              spec:
                containers:
                  - name: fvmw
                    image: "{{ fvmw_image }}"
                    ports:
                      - containerPort: 8080
                        protocol: TCP
                    env:
                      - name: FVMW_LISTEN_ADDR
                        value: ":8080"
                      - name: FVMW_DISK_PATH
                        value: "/disks"
                      - name: FVMW_EXTERNAL_HOST
                        value: "vcenter-{{ fvmw_user }}.{{ cluster_domain }}"
                      - name: FVMW_USERNAME
                        valueFrom:
                          secretKeyRef:
                            name: fvmw-credentials
                            key: username
                      - name: FVMW_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: fvmw-credentials
                            key: password
                    volumeMounts:
                      - name: disks
                        mountPath: /disks
                        readOnly: true
                    resources:
                      requests:
                        cpu: 50m
                        memory: 64Mi
                      limits:
                        cpu: 500m
                        memory: 256Mi
                    readinessProbe:
                      httpGet:
                        path: /about
                        port: 8080
                      initialDelaySeconds: 3
                      periodSeconds: 10
                    livenessProbe:
                      httpGet:
                        path: /about
                        port: 8080
                      initialDelaySeconds: 5
                      periodSeconds: 30
                volumes:
                  - name: disks
                    persistentVolumeClaim:
                      claimName: "{{ fvmw_disk_pvc }}"
                      readOnly: true

    - name: "Create Service for {{ fvmw_user }}"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: v1
          kind: Service
          metadata:
            name: "vcenter-{{ fvmw_user }}"
            namespace: "{{ namespace }}"
            labels:
              app: fvmw
              user: "{{ fvmw_user }}"
          spec:
            selector:
              app: fvmw
              user: "{{ fvmw_user }}"
            ports:
              - port: 8080
                targetPort: 8080
                protocol: TCP

    - name: "Create Route for {{ fvmw_user }}"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: "vcenter-{{ fvmw_user }}"
            namespace: "{{ namespace }}"
            labels:
              app: fvmw
              user: "{{ fvmw_user }}"
          spec:
            host: "vcenter-{{ fvmw_user }}.{{ cluster_domain }}"
            to:
              kind: Service
              name: "vcenter-{{ fvmw_user }}"
            port:
              targetPort: 8080
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect
